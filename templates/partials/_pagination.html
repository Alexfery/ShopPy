{% if page_obj and page_obj.paginator.num_pages > 1 %}
  <div class="mt-8 flex items-center justify-center gap-2 text-sm">
    {% if page_obj.has_previous %}
      <a class="btn-secondary !py-2 !px-3" href="?page={{ page_obj.previous_page_number }}">Prev</a>
    {% endif %}

    <span class="opacity-70">Pagina {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>

    {% if page_obj.has_next %}
      <a class="btn-secondary !py-2 !px-3" href="?page={{ page_obj.next_page_number }}">Next</a>
    {% endif %}
  </div>
{% endif %}
