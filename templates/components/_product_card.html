<div class="card p-0 overflow-hidden">
  <a href="{{ product.get_absolute_url }}">
    {% if product.image %}
      <img class="w-full h-48 object-cover" src="{{ product.image.url }}" alt="{{ product.name }}">
    {% else %}
      <div class="w-full h-48 bg-[color:var(--cloud)] grid place-items-center">
        <span class="text-xs opacity-60">Fără imagine</span>
      </div>
    {% endif %}
  </a>

  <div class="p-5">
    <div class="flex items-start justify-between gap-3">
      <div>
        <a class="font-semibold hover:underline" href="{{ product.get_absolute_url }}">{{ product.name }}</a>
        <div class="text-xs opacity-70">{{ product.category.name }}</div>
      </div>
      <div class="font-semibold">{{ product.price }} {{ product.currency }}</div>
    </div>

    <div class="mt-4 flex items-center justify-between gap-3">
      <a class="btn-secondary" href="{{ product.get_absolute_url }}">Detalii</a>
      <form method="post" action="{% url 'cart:add' product.id %}">
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1">
        <button class="btn-primary" type="submit" {% if not product.is_in_stock %}disabled{% endif %}>Adaugă</button>
      </form>
    </div>
  </div>
</div>
